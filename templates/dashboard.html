<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .container {
            max-width: 420px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .balance {
            font-size: 30px;
            color: #22c55e;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        a {
            color: #f87171;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>💰 DSMARKET WALLET</h2>
        <div class="balance">{{ balance }}</div>
    </div>

    <div class="card">
        <h3>Deposit</h3>
        <form action="/deposit" method="POST">
            <input name="amount" placeholder="Amount">
            <button>Deposit</button>
        </form>
    </div>

    <div class="card">
        <h3>Withdraw</h3>
        <form action="/withdraw" method="POST">
            <input name="amount" placeholder="Amount">
            <button>Withdraw</button>
        </form>
    </div>

    <a href="/transactions">View Transactions</a>
    <a href="/logout">Logout</a>

</div>

</body>
</html>
