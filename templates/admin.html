<!DOCTYPE html>
<html>
<head>
    <title>DSMARKET Admin Panel</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #111827;
        }

        th, td {
            border: 1px solid #334155;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #1e293b;
        }

        a {
            background: #22c55e;
            color: white;
            padding: 6px 10px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h2>DSMARKET ADMIN APPROVAL PANEL</h2>

<table>
    <tr>
        <th>ID</th>
        <th>User ID</th>
        <th>Username</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    {% for r in requests %}
    <tr>
        <td>{{ r[0] }}</td>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>{{ r[3] }}</td>
        <td>{{ r[4] }}</td>
        <td>{{ r[5] }}</td>
        <td>
            <a href="/approve/{{ r[0] }}">Approve</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
