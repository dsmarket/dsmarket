<!DOCTYPE html>
<html>
<head>

    <title>DSMARKET ADMIN</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#0f172a;
            color:white;
        }

        .header{
            background:#111827;
            padding:20px;
            text-align:center;
        }

        .container{
            padding:20px;
        }

        .card{
            background:#111827;
            padding:20px;
            border-radius:12px;
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #334155;
            padding:12px;
            text-align:center;
        }

        th{
            background:#1e293b;
        }

        .approve{
            background:#22c55e;
            color:white;
            padding:10px 15px;
            border-radius:6px;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="header">

    <h1>DSMARKET ADMIN PANEL</h1>

</div>

<div class="container">

    <div class="card">

        <h2>Pending Requests</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            {% for r in requests %}

            <tr>

                <td>{{ r[0] }}</td>

                <td>{{ r[1] }}</td>

                <td>{{ r[2] }}</td>

                <td>ZMW {{ r[3] }}</td>

                <td>{{ r[4] }}</td>

                <td>

                    <a
                        class="approve"
                        href="/approve/{{ r[0] }}"
                    >
                        APPROVE
                    </a>

                </td>

            </tr>

            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
