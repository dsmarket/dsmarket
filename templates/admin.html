<!DOCTYPE html>
<html>
<head>
    <title>DSMARKET Admin</title>
</head>
<body>

<h2>Admin Panel</h2>

{% for r in requests %}
    <div style="border:1px solid black; padding:10px; margin:10px;">

        <p>ID: {{ r[0] }}</p>
        <p>User: {{ r[2] }}</p>
        <p>Type: {{ r[3] }}</p>
        <p>Amount: {{ r[4] }}</p>
        <p>Status: {{ r[5] }}</p>

        {% if r[6] %}
            <p>Number: {{ r[6] }}</p>
        {% endif %}

        <a href="/approve/{{ r[0] }}">Approve</a>

    </div>
{% endfor %}

</body>
</html>
