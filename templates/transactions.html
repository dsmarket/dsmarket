<!DOCTYPE html>
<html>
<head>
    <title>Transactions</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #111827;
        }

        th, td {
            padding: 10px;
            border: 1px solid #334155;
            text-align: center;
        }

        th {
            background: #1f2937;
        }

        a {
            color: #38bdf8;
        }
    </style>
</head>

<body>

<h2>📊 Transaction History</h2>

<table>
    <tr>
        <th>Type</th>
        <th>Amount</th>
    </tr>

    {% for t in data %}
    <tr>
        <td>{{ t[0] }}</td>
        <td>{{ t[1] }}</td>
    </tr>
    {% endfor %}

</table>

<br>
<a href="/dashboard">Back</a>

</body>
</html>
